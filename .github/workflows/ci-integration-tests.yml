name: CI — Integration Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  integration-tests:
    name: Integration tests (MongoDB)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: test
      MONGODB_URI: mongodb://localhost:27017/healthai_coach_test
      BACKEND_API_KEY: test-api-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Run integration tests
        run: |
          # Exit code 5 = no tests collected — acceptable until integration tests are added
          pytest -m "integration" \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v \
          || { code=$?; [ $code -eq 5 ] && echo "No integration tests collected — skipping" && exit 0; exit $code; }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage.xml
          retention-days: 7
